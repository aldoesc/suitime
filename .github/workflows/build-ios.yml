# -----------------------------------------------------------------------------
# Build iOS (.ipa) de Gestor Operacional SUI en un runner macOS gratuito.
#
# Se dispara de dos maneras:
#   1. Manual: Actions > Build iOS > Run workflow  (botón verde)
#   2. Tag:    git tag v1.0.1 && git push --tags   (compila automáticamente)
#
# Primera ejecución (sin firma):
#   Produce un .ipa SIN firmar como artefacto descargable. Sirve para TestFlight
#   subido manualmente vía Transporter.app, o para resideload con AltStore/Sideloadly.
#
# Para firmar automáticamente (App Store Connect API):
#   En Settings > Secrets and variables > Actions crea:
#     - APPLE_TEAM_ID               (ej. ABC1234XYZ)
#     - APPLE_CERTIFICATE_BASE64    (distribution .p12 en base64)
#     - APPLE_CERTIFICATE_PASSWORD  (password del .p12)
#     - APPLE_PROVISIONING_PROFILE_BASE64  (.mobileprovision en base64)
#   Luego descomenta el paso "Import signing assets" más abajo.
# -----------------------------------------------------------------------------
name: Build iOS

on:
  workflow_dispatch:
    inputs:
      export_method:
        description: 'Export method'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - ad-hoc
          - app-store
          - enterprise
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: macos-14  # Apple Silicon, Xcode 15+ preinstalado
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter doctor (informativo)
        run: flutter doctor -v

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flet-cli

      - name: Instalar CocoaPods (si hace falta)
        run: |
          if ! command -v pod >/dev/null 2>&1; then
            sudo gem install cocoapods
          fi
          pod --version

      # -----------------------------------------------------------------------
      # Firma (opcional, descomenta si tienes los secrets configurados)
      # -----------------------------------------------------------------------
      # - name: Import signing assets
      #   env:
      #     CERT_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      #     CERT_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      #     PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
      #   run: |
      #     KEYCHAIN=build.keychain
      #     KEYCHAIN_PASS=${{ github.run_id }}
      #     security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
      #     security default-keychain -s "$KEYCHAIN"
      #     security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
      #     security set-keychain-settings -t 3600 -u "$KEYCHAIN"
      #     echo "$CERT_BASE64" | base64 --decode > cert.p12
      #     security import cert.p12 -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
      #     security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN"
      #     mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
      #     echo "$PROFILE_BASE64" | base64 --decode \
      #       > ~/Library/MobileDevice/Provisioning\ Profiles/sui.mobileprovision

      - name: Compilar IPA
        env:
          # Evita UnicodeEncodeError en el spinner de Flet
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: '1'
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          EXPORT_METHOD: ${{ github.event.inputs.export_method || 'development' }}
        run: |
          ARGS="build ipa --verbose --ios-export-method $EXPORT_METHOD"
          if [ -n "$APPLE_TEAM_ID" ]; then
            ARGS="$ARGS --ios-team-id $APPLE_TEAM_ID"
          fi
          flet $ARGS

      - name: Localizar artefacto
        id: find
        run: |
          IPA=$(find build/ipa -name '*.ipa' | head -n 1)
          echo "Encontrado: $IPA"
          echo "ipa_path=$IPA" >> "$GITHUB_OUTPUT"
          echo "ipa_name=$(basename "$IPA")" >> "$GITHUB_OUTPUT"

      - name: Publicar artefacto
        uses: actions/upload-artifact@v4
        with:
          name: gestor-sui-ios
          path: ${{ steps.find.outputs.ipa_path }}
          retention-days: 14

      - name: Adjuntar a release (si fue por tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find.outputs.ipa_path }}
